{% extends "base.html" %}
{% block title %}Status — LancoBot{% endblock %}
{% block content %}

<div class="mb-8">
  <h1 class="text-2xl font-bold text-white">Bot Status</h1>
  <p class="text-gray-400 mt-1">Live metrics written by the bot every 30 seconds.</p>
</div>

<!-- Online indicator -->
<div class="flex items-center gap-2 mb-8">
  {% if metrics %}
  <span class="relative flex h-3 w-3">
    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
    <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
  </span>
  <span class="text-sm font-medium text-green-400">Online</span>
  {% else %}
  <span class="relative flex h-3 w-3">
    <span class="relative inline-flex rounded-full h-3 w-3 bg-gray-600"></span>
  </span>
  <span class="text-sm font-medium text-gray-500">No data</span>
  {% endif %}
</div>

<!-- Metrics cards — HTMX auto-refresh -->
<div id="metrics-container"
     hx-get="{{ url_for('status_partial') }}"
     hx-trigger="every 30s"
     hx-swap="innerHTML">
  {% include "partials/metrics_cards.html" %}
</div>

{% endblock %}
