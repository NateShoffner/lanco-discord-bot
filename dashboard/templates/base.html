<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-950">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}LancoBot Dashboard{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            discord: { DEFAULT: '#5865F2', hover: '#4752C4' },
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
</head>
<body class="h-full text-gray-300 antialiased">

  <!-- Navbar -->
  <nav class="bg-gray-900 border-b border-gray-800 sticky top-0 z-10">
    <div class="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between">
      <div class="flex items-center gap-6">
        <a href="{{ url_for('index') }}" class="text-white font-bold text-lg tracking-tight hover:text-discord transition-colors">
          LancoBot
        </a>
        {% if user %}
        <div class="hidden sm:flex items-center gap-4 text-sm text-gray-400">
          <a href="{{ url_for('index') }}" class="hover:text-white transition-colors">Servers</a>
          <a href="{{ url_for('status') }}" class="hover:text-white transition-colors">Status</a>
          <a href="{{ url_for('logs') }}" class="hover:text-white transition-colors">Logs</a>
        </div>
        {% endif %}
      </div>
      {% if user %}
      <div class="flex items-center gap-3 text-sm">
        {% if user.avatar %}
        <img src="https://cdn.discordapp.com/avatars/{{ user.id }}/{{ user.avatar }}.png?size=32"
             class="w-8 h-8 rounded-full" alt="avatar" />
        {% endif %}
        <span class="hidden sm:block text-gray-300">{{ user.username }}</span>
        <a href="{{ url_for('logout') }}" class="text-gray-500 hover:text-gray-200 transition-colors">Logout</a>
      </div>
      {% endif %}
    </div>
  </nav>

  <!-- Page content -->
  <main class="max-w-5xl mx-auto px-4 py-10">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
