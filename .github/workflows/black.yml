name: Lint

on:
  push:
    paths:
      - "app/**"
      - "pyproject.toml"
  pull_request:
    paths:
      - "app/**"
      - "pyproject.toml"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: psf/black@stable
        with:
          options: "--check --verbose"
          src: "./app"
